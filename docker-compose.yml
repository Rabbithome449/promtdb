services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: promtdb
      POSTGRES_USER: promtdb
      POSTGRES_PASSWORD: promtdb
    ports:
      - "5432:5432"
    volumes:
      - promtdb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promtdb -d promtdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://promtdb:promtdb@db:5432/promtdb
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  promtdb_pgdata:
