services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: promtdb
      POSTGRES_USER: promtdb
      POSTGRES_PASSWORD: promtdb
    volumes:
      - promtdb_pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile.unified
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://promtdb:promtdb@db:5432/promtdb
      CORS_ORIGINS: "*"
      PROMPTDB_DEFAULT_ADMIN_USER: promptdb
      PROMPTDB_DEFAULT_ADMIN_PASS: promptdb
    depends_on:
      - db
    ports:
      - "17813:80"

volumes:
  promtdb_pgdata:
